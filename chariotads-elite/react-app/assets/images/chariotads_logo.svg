<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0a1f38"/>
    </radialGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="spokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>

  <!-- Speed streak lines (motion effect) -->
  <line x1="6" y1="22" x2="14" y2="22" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="4" y1="27" x2="13" y2="27" stroke="#fb923c" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="6" y1="32" x2="13" y2="32" stroke="#fb923c" stroke-width="1" stroke-linecap="round" opacity="0.25"/>

  <!-- Outer wheel ring -->
  <circle cx="36" cy="32" r="18" stroke="url(#wheelGrad)" stroke-width="3" fill="none"/>

  <!-- Inner hub circle -->
  <circle cx="36" cy="32" r="4.5" fill="url(#wheelGrad)"/>
  <circle cx="36" cy="32" r="2.5" fill="#0a1f38"/>

  <!-- Spokes (8 spokes) -->
  <line x1="36" y1="14" x2="36" y2="18" stroke="url(#spokeGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="36" y1="50" x2="36" y2="46" stroke="url(#spokeGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="18" y1="32" x2="22" y2="32" stroke="url(#spokeGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="54" y1="32" x2="50" y2="32" stroke="url(#spokeGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Diagonal spokes -->
  <line x1="23.27" y1="19.27" x2="26.1" y2="22.1" stroke="url(#spokeGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="48.73" y1="44.73" x2="45.9" y2="41.9" stroke="url(#spokeGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="23.27" y1="44.73" x2="26.1" y2="41.9" stroke="url(#spokeGrad)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="48.73" y1="19.27" x2="45.9" y2="22.1" stroke="url(#spokeGrad)" stroke-width="2.2" stroke-linecap="round"/>
</svg>
